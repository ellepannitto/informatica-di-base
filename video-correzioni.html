<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video correzioni - Informatica di Base</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f9f9f9; color: #111; padding: 2rem 1rem; }
.page { max-width: 860px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 500; color: #2D2D6B; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 0.75rem; }
.nav-links { display: flex; gap: 12px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: flex-start; }
.nav-link { font-size: 12px; padding: 3px 10px; border-radius: 8px; background: #EEF2FF; color: #3D52A0; text-decoration: none; font-weight: 500; border: 0.5px solid #C7D2F0; }
.nav-link:hover { background: #E0E7FF; }
.module { background: #fff; border: 0.5px solid #ddd; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
.module.prova { border: 0.5px solid #9EC8F0; background: #EBF4FB; }
.module-header { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; user-select: none; }
.module-header:hover { background: #fafafa; }
.module.prova .module-header:hover { background: #e3eff8; }
.module-num { font-size: 11px; font-weight: 500; color: #888; min-width: 24px; }
.module-title { font-size: 14px; font-weight: 500; color: #111; flex: 1; }
.module.prova .module-title { color: #0C447C; }
.entry-count { font-size: 11px; color: #aaa; }
.module.prova .entry-count { color: #7aafd4; }
.arrow { font-size: 12px; color: #bbb; transition: transform 0.2s; margin-left: 4px; }
.open .arrow { transform: rotate(90deg); }
.module-body { padding: 0 16px 12px 50px; border-top: 0.5px solid #eee; }
.module.prova .module-body { border-top: 0.5px solid #9EC8F0; }
.empty-note { font-size: 12px; color: #bbb; padding: 8px 0; font-style: italic; }
.entry { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; color: #444; border-bottom: 0.5px solid #eee; }
.entry:last-child { border-bottom: none; }
.entry-icon { font-size: 11px; color: #bbb; flex-shrink: 0; }
.module.prova .entry-icon { color: #7aafd4; }
.entry a { color: #3D52A0; text-decoration: none; }
.entry a:hover { text-decoration: underline; }
.entry code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.9em; background: rgba(0,0,0,0.05); padding: 0 4px; border-radius: 4px; }
</style>
</head>
<body>
<div class="page">
  <h1>Informatica di Base</h1>
  <p class="subtitle">Università degli Studi di Salerno</p>
  <nav class="nav-links">
    <a class="nav-link" href="programma.html">← Programma</a>
  </nav>
  <div id="modules"></div>
</div>

<script>
const data = [{"num": "01", "title": "Introduzione alla programmazione e Python", "prova": false, "entries": []}, {"num": "02", "title": "Variabili e strutture decisionali", "prova": false, "entries": []}, {"num": "03", "title": "Dall'if al while", "prova": false, "entries": []}, {"num": "04", "title": "Iterazione con sentinelle, e liste", "prova": false, "entries": []}, {"num": "P1", "title": "Prova intermedia 1", "prova": true, "entries": [{"title": "Esercitazione 2 - 7 - fizzbuzz", "url": "https://youtu.be/IxA4z9hMk98"}, {"title": "Esercitazione 2 - 8 - Conta positivi e negativi", "url": "https://youtu.be/iHr-kacqp60"}, {"title": "Es. 7A — Programmazione (scansione di una stringa e stampa multipli)", "url": "https://youtu.be/iyx-HfJ8zjg"}, {"title": "Es. 7B — Programmazione (scansione di una stringa e stampa non multipli)", "url": "https://youtu.be/mZSUgWUqyDY"}, {"title": "Es. 8A — Programmazione avanzata (divisione intera senza <code>//</code>)", "url": "https://youtu.be/N5I84wrZCfY"}, {"title": "Es. 8B — Programmazione avanzata (potenza senza <code>**</code>)", "url": "https://www.youtube.com/watch?v=eg7-XmZBmQU"}]}, {"num": "05", "title": "Funzioni e procedure", "prova": false, "entries": []}, {"num": "06", "title": "Memoria e passaggio degli argomenti", "prova": false, "entries": []}, {"num": "P2", "title": "Prova intermedia 2", "prova": true, "entries": []}, {"num": "07", "title": "Ciclo for e iterazione", "prova": false, "entries": []}, {"num": "08", "title": "File e formati strutturati", "prova": false, "entries": []}, {"num": "P3", "title": "Prova intermedia 3", "prova": true, "entries": []}, {"num": "09", "title": "Dizionari, set e organizzazione dell'informazione", "prova": false, "entries": []}, {"num": "10", "title": "Git e controllo di versione", "prova": false, "entries": []}];

const cont = document.getElementById("modules");

data.forEach((m) => {
  const div = document.createElement("div");
  div.className = "module" + (m.prova ? " prova" : "");

  const count = m.entries.length;
  const countHtml = count > 0
    ? `<span class="entry-count">${count} video</span>`
    : `<span class="entry-count">nessun video</span>`;

  const entriesHtml = count === 0
    ? `<p class="empty-note">Nessun video disponibile.</p>`
    : m.entries.map(e => {
        const label = e.url && e.url !== "PLACEHOLDER"
          ? `<a href="${e.url}" target="_blank">${e.title}</a>`
          : `<span style="color:#888">${e.title}</span>`;
        const icon = e.url && e.url !== "PLACEHOLDER" ? "▶" : "○";
        return `<div class="entry"><span class="entry-icon">${icon}</span>${label}</div>`;
      }).join("");

  div.innerHTML = `
    <div class="module-header">
      <span class="module-num">${m.num}</span>
      <span class="module-title">${m.title}</span>
      ${countHtml}
      <span class="arrow">›</span>
    </div>
    <div class="module-body" style="display:none">
      <div style="margin-top:8px">${entriesHtml}</div>
    </div>`;

  div.querySelector(".module-header").addEventListener("click", () => {
    const body = div.querySelector(".module-body");
    const open = body.style.display !== "none";
    body.style.display = open ? "none" : "block";
    div.classList.toggle("open", !open);
  });

  cont.appendChild(div);
});
</script>
</body>
</html>
