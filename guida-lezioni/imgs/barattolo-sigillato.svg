<svg width="535" height="245" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- VECCHIO BARATTOLO (abbandonato, sfumato) - center x=100 -->
  <g opacity="0.30">
    <!-- Coperchio sigillato -->
    <rect x="44" y="8" width="112" height="17" rx="5"
          fill="#7a9e7a" stroke="#4a7a4a" stroke-width="1.5"/>
    <!-- Banda di sigillo -->
    <rect x="36" y="22" width="128" height="8" rx="3"
          fill="#9aba9a" stroke="#5a8a5a" stroke-width="1"/>
    <!-- Lucchetto: corpo -->
    <rect x="89" y="9" width="22" height="14" rx="3"
          fill="#3a6a3a" stroke="#2a5a2a" stroke-width="1"/>
    <!-- Lucchetto: arco -->
    <path d="M 92 9 Q 92 1 100 1 Q 108 1 108 9"
          fill="none" stroke="#3a6a3a" stroke-width="2.5"/>
    <!-- Collo -->
    <rect x="58" y="29" width="84" height="12" rx="3"
          fill="rgba(200,225,245,0.5)" stroke="#6090b0" stroke-width="1.5"/>
    <!-- Corpo -->
    <path d="M 38 39 L 38 183 Q 38 205 100 205 Q 162 205 162 183 L 162 39 Z"
          fill="rgba(210,235,255,0.35)" stroke="#6090b0" stroke-width="2"/>
    <!-- Riflesso vetro -->
    <path d="M 52 43 L 52 180"
          fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
    <!-- Valore -->
    <text x="100" y="134" text-anchor="middle"
          font-size="44" font-weight="bold" fill="#1a3a60">42</text>
  </g>
  <text x="100" y="228" text-anchor="middle"
        font-size="11" fill="#aaa">non più raggiungibile</text>

  <!-- FRECCIA con istruzione -->
  <line x1="168" y1="120" x2="250" y2="120"
        stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="209" y="111" text-anchor="middle"
        font-family="monospace" font-size="13" fill="#333">x = 43</text>

  <!-- NUOVO BARATTOLO - center x=360 -->
  <!-- Coperchio sigillato -->
  <rect x="304" y="8" width="112" height="17" rx="5"
        fill="#7a9e7a" stroke="#4a7a4a" stroke-width="1.5"/>
  <!-- Banda di sigillo -->
  <rect x="296" y="22" width="128" height="8" rx="3"
        fill="#9aba9a" stroke="#5a8a5a" stroke-width="1"/>
  <!-- Lucchetto: corpo -->
  <rect x="349" y="9" width="22" height="14" rx="3"
        fill="#3a6a3a" stroke="#2a5a2a" stroke-width="1"/>
  <!-- Lucchetto: arco -->
  <path d="M 352 9 Q 352 1 360 1 Q 368 1 368 9"
        fill="none" stroke="#3a6a3a" stroke-width="2.5"/>
  <!-- Collo -->
  <rect x="318" y="29" width="84" height="12" rx="3"
        fill="rgba(200,225,245,0.5)" stroke="#6090b0" stroke-width="1.5"/>
  <!-- Corpo -->
  <path d="M 298 39 L 298 183 Q 298 205 360 205 Q 422 205 422 183 L 422 39 Z"
        fill="rgba(210,235,255,0.28)" stroke="#6090b0" stroke-width="2"/>
  <!-- Riflesso vetro -->
  <path d="M 312 43 L 312 180"
        fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="4" stroke-linecap="round"/>
  <!-- Valore -->
  <text x="360" y="134" text-anchor="middle"
        font-size="44" font-weight="bold" fill="#1a3a60" opacity="0.9">43</text>

  <!-- Etichetta x appesa a destra -->
  <line x1="422" y1="115" x2="458" y2="115"
        stroke="#a08040" stroke-width="1.4" stroke-dasharray="4,3"/>
  <circle cx="458" cy="115" r="5" fill="white" stroke="#a08040" stroke-width="1.5"/>
  <rect x="460" y="95" width="60" height="40" rx="5"
        fill="#fffbe6" stroke="#c8a820" stroke-width="1.8"/>
  <text x="490" y="122" text-anchor="middle"
        font-size="26" font-weight="bold" font-family="monospace" fill="#3a2800">x</text>

  <text x="360" y="228" text-anchor="middle"
        font-size="11" fill="#555">nuovo barattolo</text>
</svg>
